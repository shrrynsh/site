<!-- ===== HERO SECTION ===== -->
<section id="hero" class="section hero">
    <div class="hero-content">
        <div class="hero-text">
            <p class="hero-greeting animate-in">Hello, I'm</p>
            <h1 class="hero-name animate-in delay-1">{{ site.author.name }}<span class="accent-dot">.</span></h1>
            <p class="hero-tagline animate-in delay-2">{{ site.author.tagline }}</p>
            <p class="hero-bio animate-in delay-3">{{ site.author.bio }}</p>
            <div class="hero-actions animate-in delay-4">
                <a href="#projects" class="btn btn-primary">View Projects</a>
                <a href="#contact" class="btn btn-outline">Get in Touch</a>
            </div>
            <div class="hero-social animate-in delay-4">
                {% if site.author.github %}
                <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener" aria-label="GitHub"
                    class="social-icon">
                    <i data-lucide="github"></i>
                </a>
                {% endif %}
                {% if site.author.linkedin %}
                <a href="https://linkedin.com/in/{{ site.author.linkedin }}" target="_blank" rel="noopener"
                    aria-label="LinkedIn" class="social-icon">
                    <i data-lucide="linkedin"></i>
                </a>
                {% endif %}
            </div>
        </div>
        <div class="hero-visual animate-in delay-2">
            <div class="avatar-ring">
                <img src="{{ site.baseurl }}/img/avatar.png" alt="{{ site.author.name }}" class="avatar-img">
            </div>
        </div>
    </div>
    <div class="scroll-indicator animate-in delay-4">
        <i data-lucide="chevron-down"></i>
    </div>
</section>
